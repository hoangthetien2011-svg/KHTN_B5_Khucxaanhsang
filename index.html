<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trắc nghiệm KHTN 9 - Khúc xạ ánh sáng</title>
    <!-- Cấu hình MathJax -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            options: { enableMenu: false }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" id="MathJax-script" async></script>
    <style>
        :root {
            --primary-color: #1a365d;
            --secondary-color: #2b6cb0;
            --light-blue: #ebf8ff;
            --white: #ffffff;
            --error: #e53e3e;
            --success: #38a169;
            --text-dark: #2d3748;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f4f8;
            color: var(--text-dark);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            user-select: none;
        }

        .hidden { display: none !important; }

        #app {
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            background: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        header {
            background: var(--primary-color);
            color: var(--white);
            padding: 15px;
            text-align: center;
            font-size: 14px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-info { display: flex; justify-content: space-between; align-items: center; width: 100%; }

        #welcome-screen {
            padding: 40px 20px;
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .main-title {
            color: var(--primary-color);
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        .btn-container { display: flex; gap: 15px; margin-top: 30px; }
        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
        }
        .btn-practice { background-color: var(--secondary-color); }
        .btn-exam { background-color: var(--error); }

        #quiz-screen { flex-grow: 1; padding: 20px; display: flex; flex-direction: column; }
        .q-number { font-weight: 800; color: var(--secondary-color); margin-bottom: 10px; display: block; }
        .q-text { font-size: 19px; line-height: 1.5; margin-bottom: 20px; }

        .options-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 12px; }
        .option-item {
            padding: 15px;
            border: 2px solid #edf2f7;
            border-radius: 10px;
            cursor: pointer;
            background: #fff;
            transition: 0.2s;
        }
        .option-item.selected { border-color: var(--secondary-color); background: var(--light-blue); font-weight: 600; }

        .tf-container { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .tf-row { border-bottom: 1px solid #edf2f7; }
        .tf-statement { padding: 12px 0; font-size: 16px; }
        .tf-actions { display: flex; gap: 5px; padding: 10px 0; justify-content: flex-end; }
        .btn-tf {
            padding: 8px 12px;
            border: 1px solid #cbd5e0;
            background: white;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            min-width: 65px;
        }
        .btn-tf.active-true { background: var(--success); color: white; border-color: var(--success); }
        .btn-tf.active-false { background: var(--error); color: white; border-color: var(--error); }

        .short-answer-input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #cbd5e0;
            border-radius: 8px;
            text-align: center;
        }

        .nav-footer {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
            gap: 10px;
        }
        .btn-nav { padding: 12px 20px; border: none; border-radius: 8px; background: var(--primary-color); color: white; font-weight: 600; cursor: pointer; flex: 1; }
        .btn-nav:disabled { background: #cbd5e0; cursor: not-allowed; }

        #result-screen { padding: 30px 20px; text-align: center; }
        .score-box { font-size: 50px; font-weight: 900; color: var(--primary-color); margin: 20px 0; }
        .rank-badge { display: inline-block; padding: 6px 20px; border-radius: 20px; color: white; font-weight: 800; margin-bottom: 20px; }
        
        .review-item { text-align: left; background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .explanation { background: #f0fff4; padding: 12px; border-left: 4px solid var(--success); margin-top: 10px; font-size: 14px; color: #276749; }

        .copyright { padding: 15px; text-align: center; font-size: 12px; color: #a0aec0; background: #f8fafc; }
        .warning-text { color: var(--error); font-weight: 800; margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>

<div id="app">
    <header id="quiz-header" class="hidden">
        <div class="header-info">
            <span id="header-user"></span>
            <span id="timer-display" style="font-family: monospace; font-size: 1.2rem;">00:00</span>
        </div>
    </header>

    <div id="welcome-screen">
        <div class="main-title">Khúc xạ ánh sáng<br><span style="font-size: 16px;">KHTN 9</span></div>
        <div class="input-group"><label>Số báo danh</label><input type="text" id="sbd"></div>
        <div class="input-group"><label>Họ và tên</label><input type="text" id="fullname"></div>
        <div class="input-group"><label>Lớp</label><input type="text" id="class-name"></div>
        <div class="input-group"><label>Trường</label><input type="text" id="school-name"></div>

        <div class="btn-container">
            <button class="btn btn-practice" onclick="startApp('practice')">LUYỆN TẬP</button>
            <button class="btn btn-exam" onclick="startApp('exam')">KIỂM TRA</button>
        </div>
        <div id="exam-warning" class="warning-text hidden">Cảnh báo quan trọng: “Nếu bạn rời khỏi trang làm bài. Hệ thống sẽ tự động nộp bài.”</div>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="question-container"></div>
    </div>

    <div id="quiz-nav" class="nav-footer hidden">
        <button class="btn-nav" id="prev-btn" onclick="changeQuestion(-1)">Quay lại</button>
        <button class="btn-nav" id="next-btn" onclick="changeQuestion(1)">Tiếp</button>
        <button class="btn-nav" id="submit-btn" style="background-color: var(--success);" onclick="confirmSubmit()">Nộp bài</button>
    </div>

    <div id="result-screen" class="hidden">
        <h2 id="result-greeting"></h2>
        <div class="score-box" id="result-score">0/7</div>
        <div class="rank-badge" id="result-rank"></div>
        <div id="review-list"></div>
        <button class="btn btn-practice" style="margin-top: 20px; width: 100%;" onclick="location.reload()">Làm lại</button>
    </div>

    <div class="copyright">Bản quyền thuộc về Trường THCS Thuỷ Phương, Thành phố Huế</div>
</div>

<script>
    // NGÂN HÀNG CÂU HỎI MỞ RỘNG (CHỦ ĐỀ KHÚC XẠ ÁNH SÁNG)
    const KX_BANK = [
        // PHẦN I: MCQ (24 CÂU)
        { id: 'KX.1', type: 'mcq', level: 'Nhận biết', question: 'Hiện tượng ánh sáng bị lệch phương khi truyền xiên góc qua mặt phân cách giữa hai môi trường trong suốt được gọi là hiện tượng', options: ['phản xạ ánh sáng.', 'tán sắc ánh sáng.', 'khúc xạ ánh sáng.', 'hấp thụ ánh sáng.'], answer: 2, explanation: 'Đây là định nghĩa cơ bản về hiện tượng khúc xạ ánh sáng.' },
        { id: 'KX.2', type: 'mcq', level: 'Nhận biết', question: 'Tia khúc xạ nằm trong mặt phẳng nào sau đây?', options: ['Mặt phẳng phân cách.', 'Mặt phẳng tới.', 'Mặt phẳng pháp tuyến.', 'Mặt phẳng bất kì.'], answer: 1, explanation: 'Theo định luật khúc xạ, tia khúc xạ nằm trong mặt phẳng tới.' },
        { id: 'KX.3', type: 'mcq', level: 'Nhận biết', question: 'Góc tạo bởi tia tới và pháp tuyến tại điểm tới được gọi là', options: ['góc khúc xạ.', 'góc tới.', 'góc phản xạ.', 'góc lệch.'], answer: 1, explanation: 'Góc tới $i$ là góc hợp bởi tia tới và pháp tuyến.' },
        { id: 'KX.4', type: 'mcq', level: 'Nhận biết', question: 'Khi tia sáng truyền vuông góc với mặt phân cách giữa hai môi trường trong suốt thì góc khúc xạ bằng', options: ['$0^\\circ$', '$45^\\circ$', '$90^\\circ$', '$180^\\circ$'], answer: 0, explanation: 'Truyền vuông góc ($i=0^\\circ$) thì tia sáng truyền thẳng ($r=0^\\circ$).' },
        { id: 'KX.5', type: 'mcq', level: 'Thông hiểu', question: 'Khi ánh sáng truyền từ không khí vào nước, mối quan hệ giữa góc tới $i$ và góc khúc xạ $r$ là', options: ['$i < r$', '$i = r$', '$i > r$', '$i = 2r$'], answer: 2, explanation: 'Nước chiết quang hơn không khí nên tia sáng bị bẻ về gần pháp tuyến hơn ($r < i$).' },
        { id: 'KX.6', type: 'mcq', level: 'Thông hiểu', question: 'Hiện tượng chiếc ống hút cắm trong ly nước trông như bị gãy ở mặt nước là do', options: ['phản xạ ánh sáng.', 'khúc xạ ánh sáng.', 'tán sắc ánh sáng.', 'hấp thụ ánh sáng.'], answer: 1, explanation: 'Do hiện tượng khúc xạ ánh sáng làm thay đổi phương truyền của tia sáng.' },
        { id: 'KX.7', type: 'mcq', level: 'Thông hiểu', question: 'Chiết suất tỉ đối $n_{21}$ của môi trường 2 đối với môi trường 1 được tính bằng công thức', options: ['$n_{21} = \\frac{n_1}{n_2}$', '$n_{21} = \\frac{n_2}{n_1}$', '$n_{21} = n_1 + n_2$', '$n_{21} = n_1 \\cdot n_2$'], answer: 1, explanation: 'Công thức đúng là $n_{21} = n_2 / n_1$.' },
        { id: 'KX.8', type: 'mcq', level: 'Thông hiểu', question: 'Khi tia tới đi từ môi trường chiết quang hơn sang môi trường chiết quang kém, nhận xét nào sau đây ĐÚNG?', options: ['$r > i$', '$r < i$', '$r = i$', 'Không xác định được.'], answer: 0, explanation: 'Sang môi trường kém chiết quang, tia sáng lệch xa pháp tuyến, nên $r > i$.' },
        { id: 'KX.9', type: 'mcq', level: 'Vận dụng', question: 'Tia sáng truyền từ không khí vào nhựa trong suốt. Khi góc tới $i = 60^\\circ$ thì góc khúc xạ $r = 30^\\circ$. Chiết suất của nhựa là', options: ['1,41', '1,50', '1,73', '2,00'], answer: 2, explanation: '$n = \\sin(60^\\circ) / \\sin(30^\\circ) = \\sqrt{3} \\approx 1,73$.' },
        { id: 'KX.10', type: 'mcq', level: 'Vận dụng', question: 'Hiện tượng phản xạ toàn phần có thể xảy ra khi ánh sáng truyền từ', options: ['không khí vào thủy tinh.', 'chân không vào nhựa.', 'thủy tinh vào không khí.', 'không khí vào nước.'], answer: 2, explanation: 'Phản xạ toàn phần chỉ xảy ra khi truyền từ môi trường chiết quang hơn sang kém.' },
        { id: 'KX.11', type: 'mcq', level: 'Nhận biết', question: 'Môi trường chiết quang hơn là môi trường có', options: ['chiết suất tuyệt đối lớn hơn.', 'chiết suất tuyệt đối nhỏ hơn.', 'vận tốc ánh sáng lớn hơn.', 'độ trong suốt cao hơn.'], answer: 0, explanation: 'Chiết suất tuyệt đối lớn đặc trưng cho môi trường chiết quang hơn.' },
        { id: 'KX.12', type: 'mcq', level: 'Nhận biết', question: 'Chiết suất tuyệt đối của chân không được quy ước bằng', options: ['0', '1', '1,33', '1,5'], answer: 1, explanation: 'Quy ước chiết suất chân không bằng 1.' },
        { id: 'KX.13', type: 'mcq', level: 'Thông hiểu', question: 'Góc khúc xạ là góc tạo bởi', options: ['tia tới và pháp tuyến.', 'tia khúc xạ và pháp tuyến.', 'tia khúc xạ và mặt phân cách.', 'tia tới và tia khúc xạ.'], answer: 1, explanation: 'Góc khúc xạ tính từ tia khúc xạ đến pháp tuyến.' },
        { id: 'KX.14', type: 'mcq', level: 'Thông hiểu', question: 'Khi góc tới $i$ tăng dần thì góc khúc xạ $r$ sẽ', options: ['giảm dần.', 'tăng dần.', 'không đổi.', 'luôn bằng $0$.'], answer: 1, explanation: 'Tỉ số $\\sin(i)/\\sin(r)$ là hằng số nên $i$ tăng thì $r$ cũng tăng.' },
        { id: 'KX.15', type: 'mcq', level: 'Vận dụng', question: 'Bể nước ($n=4/3$) sâu 1,2 m. Một người nhìn xuống đáy bể thấy đáy cách mặt nước một khoảng xấp xỉ', options: ['0,9 m', '1,2 m', '1,6 m', '0,4 m'], answer: 0, explanation: '$h\' = h / n = 1,2 / (4/3) = 0,9$ m.' },
        { id: 'KX.16', type: 'mcq', level: 'Vận dụng', question: 'Tia sáng đi từ thủy tinh ($n=1,5$) ra không khí. Góc giới hạn $i_{gh}$ có giá trị xấp xỉ', options: ['$30^\\circ$', '$42^\\circ$', '$48^\\circ$', '$60^\\circ$'], answer: 1, explanation: '$\\sin(i_{gh}) = 1/1,5 \\approx 0,66 \\Rightarrow i_{gh} \\approx 41,8^\\circ$.' },
        { id: 'KX.17', type: 'mcq', level: 'Nhận biết', question: 'Mặt phẳng tới là mặt phẳng được xác định bởi', options: ['tia tới và mặt phân cách.', 'tia tới và pháp tuyến.', 'tia khúc xạ và mặt phân cách.', 'tia khúc xạ và tia tới.'], answer: 1, explanation: 'Mặt phẳng tới chứa tia tới và pháp tuyến tại điểm tới.' },
        { id: 'KX.18', type: 'mcq', level: 'Thông hiểu', question: 'Chiết suất tuyệt đối của nước là 1,33. Điều này có nghĩa là', options: ['vận tốc ánh sáng trong nước nhanh hơn chân không 1,33 lần.', 'vận tốc ánh sáng trong chân không nhanh hơn trong nước 1,33 lần.', 'ánh sáng truyền trong nước không bị lệch phương.', 'ánh sáng truyền từ nước ra không khí luôn bị khúc xạ.'], answer: 1, explanation: '$n = c/v \Rightarrow c = n \cdot v$.' },
        { id: 'KX.19', type: 'mcq', level: 'Thông hiểu', question: 'Trong hiện tượng khúc xạ ánh sáng, tia tới và tia khúc xạ nằm', options: ['cùng phía so với pháp tuyến.', 'đối diện nhau qua pháp tuyến.', 'trong cùng một môi trường.', 'trên cùng một đường thẳng.'], answer: 1, explanation: 'Tia tới và tia khúc xạ nằm ở hai phía của pháp tuyến.' },
        { id: 'KX.20', type: 'mcq', level: 'Vận dụng', question: 'Một tia sáng truyền từ nhựa ra không khí. Khi góc tới là $45^\\circ$, tia khúc xạ đi là là mặt phân cách. Chiết suất nhựa là', options: ['1,33', '1,5', '1,41', '1,73'], answer: 2, explanation: '$n = 1 / \sin(45^\\circ) = \sqrt{2} \approx 1,41$.' },

        // PHẦN II: TRUE/FALSE (10 CÂU)
        {
            id: 'TF.1', type: 'truefalse', level: 'Thông hiểu',
            context: 'Xét tia sáng truyền từ không khí vào nước ($n = 1,33$).',
            statements: [
                'a) Tia khúc xạ luôn nằm trong mặt phẳng tới.',
                'b) Góc khúc xạ $r$ luôn lớn hơn góc tới $i$.',
                'c) Nếu góc tới $i=0^\\circ$ thì tia sáng truyền thẳng qua mặt phân cách.',
                'd) Tỉ số giữa $\\sin(i)$ và $\\sin(r)$ luôn bằng $1,33$.'
            ],
            correctPattern: [true, false, true, true],
            explanation: 'a) Đúng. b) Sai ($r < i$). c) Đúng. d) Đúng.'
        },
        {
            id: 'TF.2', type: 'truefalse', level: 'Vận dụng',
            context: 'Một tia sáng truyền từ thủy tinh ($n=1,5$) ra không khí ($n=1$).',
            statements: [
                'a) Tia sáng có xu hướng lệch xa pháp tuyến hơn.',
                'b) Hiện tượng phản xạ toàn phần có thể xảy ra.',
                'c) Khi góc tới tăng thì góc khúc xạ giảm.',
                'd) Ở góc tới $i = 0^\\circ$, tia sáng truyền thẳng.'
            ],
            correctPattern: [true, true, false, true],
            explanation: 'a) Đúng. b) Đúng. c) Sai. d) Đúng.'
        },
        {
            id: 'TF.3', type: 'truefalse', level: 'Nhận biết',
            context: 'Về khái niệm chiết suất và vận tốc ánh sáng:',
            statements: [
                'a) Chiết suất tuyệt đối của chân không bằng 1.',
                'b) Ánh sáng truyền trong nước nhanh hơn trong chân không.',
                'c) Chiết suất tỉ đối có thể nhỏ hơn 1.',
                'd) Môi trường chiết quang hơn thì chiết suất lớn hơn.'
            ],
            correctPattern: [true, false, true, true],
            explanation: 'a) Đúng. b) Sai ($v=c/n$). c) Đúng. d) Đúng.'
        },
        {
            id: 'TF.4', type: 'truefalse', level: 'Vận dụng',
            context: 'Hiện tượng khúc xạ ánh sáng khi nhìn vật dưới nước:',
            statements: [
                'a) Ta thấy vật ở gần mặt nước hơn so với thực tế.',
                'b) Hiện tượng này do phản xạ ánh sáng.',
                'c) Khoảng cách từ mặt nước đến ảnh xấp xỉ bằng $h/n$.',
                'd) Nếu ta nhìn vuông góc với mặt nước thì vẫn thấy ảnh ở vị trí khác thực tế.'
            ],
            correctPattern: [true, false, true, true],
            explanation: 'a) Đúng. b) Sai. c) Đúng. d) Đúng.'
        },
        {
            id: 'TF.5', type: 'truefalse', level: 'Thông hiểu',
            context: 'Khi ánh sáng truyền từ môi trường chiết quang hơn sang kém:',
            statements: [
                'a) Tia khúc xạ lệch xa pháp tuyến.',
                'b) Góc khúc xạ luôn lớn hơn góc tới.',
                'c) Luôn có tia khúc xạ với mọi góc tới.',
                'd) Có thể xảy ra phản xạ toàn phần.'
            ],
            correctPattern: [true, true, false, true],
            explanation: 'c) Sai vì nếu $i > i_{gh}$ sẽ phản xạ toàn phần.'
        },
        {
            id: 'TF.6', type: 'truefalse', level: 'Nhận biết',
            context: 'Các thành phần của hiện tượng khúc xạ:',
            statements: [
                'a) Pháp tuyến luôn nằm nghiêng so với mặt phân cách.',
                'b) Điểm tới là giao điểm của tia tới với mặt phân cách.',
                'c) Góc khúc xạ là góc hợp bởi tia khúc xạ và mặt phân cách.',
                'd) Tia tới nằm trong môi trường thứ nhất.'
            ],
            correctPattern: [false, true, false, true],
            explanation: 'a) Sai (vuông góc). c) Sai (hợp với pháp tuyến).'
        },
        {
            id: 'TF.7', type: 'truefalse', level: 'Thông hiểu',
            context: 'Xét tia sáng truyền từ không khí vào khối thủy tinh ($n=1,5$):',
            statements: [
                'a) Vận tốc ánh sáng bị giảm đi 1,5 lần.',
                'b) Tia sáng bị lệch về phía pháp tuyến.',
                'c) Góc khúc xạ lớn nhất có thể đạt được là $90^\\circ$.',
                'd) Nếu $\\sin(i)=0,6$ thì $\\sin(r)=0,4$.'
            ],
            correctPattern: [true, true, false, true],
            explanation: 'c) Sai vì $r < i$ nên $r$ không thể đạt $90^circ$. d) $0,6/1,5=0,4$.'
        },
        {
            id: 'TF.8', type: 'truefalse', level: 'Nhận biết',
            context: 'Về tính chất tia sáng truyền qua mặt phân cách:',
            statements: [
                'a) Mọi tia sáng đi qua mặt phân cách đều bị đổi phương.',
                'b) Tia sáng truyền thẳng nếu $i=0^\\circ$.',
                'c) Tia khúc xạ luôn nằm đối xứng với tia tới qua pháp tuyến.',
                'd) Tia khúc xạ và tia tới nằm cùng phía so với mặt phân cách.'
            ],
            correctPattern: [false, true, false, false],
            explanation: 'a) Sai. c) Sai. d) Sai.'
        },

        // PHẦN III: SHORT (10 CÂU)
        { id: 'SH.1', type: 'short', level: 'Vận dụng', question: 'Tia sáng đi từ không khí vào nước ($n = 4/3$). Nếu $\\sin(i) = 0,8$ thì $\\sin(r)$ bằng bao nhiêu?', answer: '0,6', explanation: '$\\sin(r) = 0,8 / (4/3) = 0,6$.' },
        { id: 'SH.2', type: 'short', level: 'Nhận biết', question: 'Tia tới hợp với mặt phân cách góc $60^\\circ$. Góc tới $i$ bằng bao nhiêu độ?', answer: '30', explanation: '$i = 90^\\circ - 60^\\circ = 30^\\circ$.' },
        { id: 'SH.3', type: 'short', level: 'Thông hiểu', question: 'Chiết suất thủy tinh là 1,5. Vận tốc ánh sáng trong thủy tinh nhỏ hơn trong chân không bao nhiêu lần?', answer: '1,5', explanation: '$n = c/v = 1,5$.' },
        { id: 'SH.4', type: 'short', level: 'Vận dụng', question: 'Một tia sáng đi từ thủy tinh ($n=1,5$) ra không khí. Nếu $\\sin(i) = 0,4$. Tính giá trị $\\sin(r)$.', answer: '0,6', explanation: '$\\sin(r) = 1,5 \\cdot 0,4 = 0,6$.' },
        { id: 'SH.5', type: 'short', level: 'Vận dụng', question: 'Một cái bể chứa nước ($n=4/3$) có độ sâu thực tế là 1,2 m. Một người nhìn xuống đáy thấy đáy cách mặt nước bao nhiêu mét?', answer: '0,9', explanation: '$1,2 / (4/3) = 0,9$ m.' },
        { id: 'SH.6', type: 'short', level: 'Nhận biết', question: 'Nếu góc tới $i = 0^\\circ$, thì góc khúc xạ bằng bao nhiêu độ?', answer: '0', explanation: 'Tia sáng truyền vuông góc mặt phân cách thì truyền thẳng.' },
        { id: 'SH.7', type: 'short', level: 'Vận dụng', question: 'Góc tới là $60^\\circ$, góc khúc xạ là $30^\\circ$. Chiết suất môi trường nhựa chứa tia khúc xạ bằng bao nhiêu? (Làm tròn 2 chữ số thập phân)', answer: '1,73', explanation: '$\\sin(60^\\circ)/\\sin(30^\\circ) = \\sqrt{3} \\approx 1,73$.' },
        { id: 'SH.8', type: 'short', level: 'Thông hiểu', question: 'Nếu vận tốc ánh sáng trong môi trường là $2,25 \\cdot 10^8$ m/s, chiết suất môi trường đó là bao nhiêu? ($c = 3 \\cdot 10^8$ m/s)', answer: '1,33', explanation: '$3 / 2,25 = 1,33$.' },
        { id: 'SH.9', type: 'short', level: 'Vận dụng', question: 'Góc giới hạn phản xạ toàn phần từ kim cương ($n=2,42$) ra không khí là bao nhiêu độ? (Làm tròn đến hàng đơn vị)', answer: '24', explanation: '$\\sin(i_{gh}) = 1/2,42 \Rightarrow i_{gh} \\approx 24,4^\\circ$.' },
        { id: 'SH.10', type: 'short', level: 'Thông hiểu', question: 'Tia tới truyền từ không khí vào nước. Nếu góc tới là $45^\\circ$ thì góc khúc xạ chắc chắn nhỏ hơn bao nhiêu độ?', answer: '45', explanation: 'Vì nước chiết quang hơn nên $r < i$.' }
    ];

    let currentUser = {};
    let currentQuestions = [];
    let userAnswers = {};
    let currentIndex = 0;
    let timerInterval;
    let timeLeft = 0;
    let isExam = false;
    let isFinished = false;

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function startApp(mode) {
        const sbd = document.getElementById('sbd').value.trim();
        const name = document.getElementById('fullname').value.trim();
        if (!sbd || !name) { alert('Vui lòng nhập SBD và Họ tên!'); return; }

        currentUser = { sbd, name, class: document.getElementById('class-name').value, school: document.getElementById('school-name').value };
        localStorage.setItem('khtn9_user', JSON.stringify(currentUser));
        isExam = mode === 'exam';

        if (isExam) {
            document.getElementById('exam-warning').classList.remove('hidden');
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        }

        // CHỌN CÂU HỎI CỐ ĐỊNH 12 - 4 - 4
        const mcqPool = shuffle(KX_BANK.filter(q => q.type === 'mcq')).slice(0, 12);
        const tfPool = shuffle(KX_BANK.filter(q => q.type === 'truefalse')).slice(0, 4);
        const shortPool = shuffle(KX_BANK.filter(q => q.type === 'short')).slice(0, 4);

        currentQuestions = [...mcqPool, ...tfPool, ...shortPool];

        // BẢO HIỂM: Nếu vẫn thiếu, nạp bù từ ngân hàng chung
        while (currentQuestions.length < 20) {
            const extra = KX_BANK.find(q => !currentQuestions.includes(q));
            if (extra) currentQuestions.push(extra);
            else break;
        }

        document.getElementById('welcome-screen').classList.add('hidden');
        document.getElementById('quiz-header').classList.remove('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        document.getElementById('quiz-nav').classList.remove('hidden');
        document.getElementById('header-user').innerText = `${name} - SBD: ${sbd} - ${currentUser.class}`;
        
        currentIndex = 0;
        userAnswers = {};
        renderQuestion();
        startTimer();
    }

    function startTimer() {
        clearInterval(timerInterval);
        const q = currentQuestions[currentIndex];
        timeLeft = q.type === 'mcq' ? 90 : 120;
        updateTimerUI();
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerUI();
            if (timeLeft <= 0) changeQuestion(1);
        }, 1000);
    }

    function updateTimerUI() {
        const m = Math.floor(timeLeft/60); const s = timeLeft%60;
        document.getElementById('timer-display').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function renderQuestion() {
        const q = currentQuestions[currentIndex];
        const container = document.getElementById('question-container');
        
        let label = "";
        let qNum = 0;
        if (currentIndex < 12) { label = "PHẦN I"; qNum = currentIndex + 1; }
        else if (currentIndex < 16) { label = "PHẦN II"; qNum = currentIndex - 11; }
        else { label = "PHẦN III"; qNum = currentIndex - 15; }

        let html = `<span class="q-number">${label} - Câu ${qNum}. (${currentIndex + 1}/20)</span>`;

        if (q.type === 'mcq') {
            html += `<div class="q-text">${q.question}</div><ul class="options-list">`;
            q.options.forEach((opt, i) => {
                html += `<li class="option-item ${userAnswers[currentIndex] === i ? 'selected' : ''}" onclick="selectMCQ(${i})">
                    <strong>${String.fromCharCode(65+i)}.</strong> &nbsp; ${opt}</li>`;
            });
            html += `</ul>`;
        } else if (q.type === 'truefalse') {
            html += `<div class="q-text">${q.context}</div><table class="tf-container">`;
            q.statements.forEach((s, i) => {
                const ans = userAnswers[currentIndex]?.[i];
                html += `<tr class="tf-row"><td class="tf-statement">${s}</td><td class="tf-actions">
                    <button class="btn-tf ${ans===true?'active-true':''}" onclick="selectTF(${i},true)">Đúng</button>
                    <button class="btn-tf ${ans===false?'active-false':''}" onclick="selectTF(${i},false)">Sai</button>
                </td></tr>`;
            });
            html += `</table>`;
        } else {
            html += `<div class="q-text">${q.question}</div>
                <input type="text" class="short-answer-input" oninput="saveShort(this.value)" value="${userAnswers[currentIndex]||''}" placeholder="Nhập đáp án...">`;
        }

        container.innerHTML = html;
        if (window.MathJax) MathJax.typesetPromise([container]);

        document.getElementById('prev-btn').disabled = currentIndex === 0;
        document.getElementById('next-btn').classList.toggle('hidden', currentIndex === currentQuestions.length - 1);
        document.getElementById('submit-btn').classList.toggle('hidden', currentIndex !== currentQuestions.length - 1);
    }

    function selectMCQ(i) { userAnswers[currentIndex] = i; renderQuestion(); }
    function selectTF(i, v) { if(!userAnswers[currentIndex]) userAnswers[currentIndex] = {}; userAnswers[currentIndex][i] = v; renderQuestion(); }
    function saveShort(v) { userAnswers[currentIndex] = v; }

    function changeQuestion(dir) {
        currentIndex += dir;
        if (currentIndex < 0) currentIndex = 0;
        if (currentIndex >= currentQuestions.length) { currentIndex = currentQuestions.length - 1; }
        renderQuestion(); startTimer();
    }

    function confirmSubmit() { if(confirm('Bạn có muốn nộp bài?')) finishQuiz(); }

    function finishQuiz() {
        if(isFinished) return; isFinished = true;
        clearInterval(timerInterval);
        let score = 0;
        currentQuestions.forEach((q, idx) => {
            const ua = userAnswers[idx];
            if (q.type === 'mcq' && ua === q.answer) score += 0.25;
            else if (q.type === 'truefalse') {
                let count = 0; q.correctPattern.forEach((v, i) => { if(ua && ua[i] === v) count++; });
                if(count === 1) score += 0.0625; else if(count === 2) score += 0.125; else if(count === 3) score += 0.25; else if(count === 4) score += 0.5;
            } else if (q.type === 'short' && ua?.trim().replace(',','.') === q.answer) score += 0.5;
        });

        score = Math.min(7, Math.round(score * 10) / 10);
        showResults(score);
    }

    function showResults(score) {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('quiz-nav').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('result-greeting').innerText = `Chúc mừng ${currentUser.name}!`;
        document.getElementById('result-score').innerText = `${score.toFixed(1)} / 7.0`;
        
        let rank = 'CHƯA ĐẠT'; let color = '#e53e3e';
        if (score >= 6) { rank = 'XUẤT SẮC'; color = '#38a169'; }
        else if (score >= 5) { rank = 'GIỎI'; color = '#2b6cb0'; }
        else if (score >= 4) { rank = 'KHÁ'; color = '#d69e2e'; }
        else if (score >= 3) { rank = 'ĐẠT'; color = '#718096'; }
        
        const badge = document.getElementById('result-rank');
        badge.innerText = rank; badge.style.backgroundColor = color;

        const list = document.getElementById('review-list');
        list.innerHTML = '<h3>Chi tiết bài làm:</h3>';
        currentQuestions.forEach((q, i) => {
            const div = document.createElement('div');
            div.className = 'review-item';
            div.innerHTML = `<strong>Câu ${i+1}:</strong> ${q.question || q.context}<div class="explanation">${q.explanation}</div>`;
            list.appendChild(div);
        });
        if (window.MathJax) MathJax.typesetPromise([list]);
    }

    document.addEventListener("visibilitychange", () => {
        if (isExam && !isFinished && document.visibilityState === 'hidden') {
            alert("Rời khỏi trang - Đã tự động nộp bài!"); finishQuiz();
        }
    });

    window.onload = () => {
        const saved = localStorage.getItem('khtn9_user');
        if (saved) {
            const data = JSON.parse(saved);
            document.getElementById('sbd').value = data.sbd || '';
            document.getElementById('fullname').value = data.name || '';
            document.getElementById('class-name').value = data.class || '';
            document.getElementById('school-name').value = data.school || '';
        }
    };
</script>
</body>
</html>
